
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabungan Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* == DASAR == */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background-image: url('https://i.imgur.com/I1SBHEk.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden; /* Biar scroll bar hilang */
            perspective: 1000px;
        }

        /* == EFEK CAHAYA BERGERAK (BACKGROUND) == */
        .bg-lights {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .light {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0) 70%);
            animation: floatLight linear infinite;
        }

        @keyframes floatLight {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
        }

        /* == CONTAINER UTAMA == */
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 30px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 
                0 20px 50px rgba(0,0,0,0.5),
                inset 0 0 20px rgba(255,255,255,0.1);
            padding: 30px;
            color: white;
            text-align: center;
            
            /* Animasi Awal */
            opacity: 0;
            transform: translateY(50px) scale(0.9);
            animation: cardEntry 1s cubic-bezier(0.175, 0.88, 0.32, 1.275) forwards;
        }

        @keyframes cardEntry {
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* == PROFIL == */
        .profile-section {
            position: relative;
            margin-bottom: 25px;
            opacity: 0;
            animation: slideUp 0.8s ease-out 0.3s forwards;
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-pic-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 15px;
        }

        .profile-pic {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid rgba(255,255,255,0.3);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: transform 0.5s ease;
        }

        .profile-pic:hover {
            transform: scale(1.05);
        }

        .edit-icon {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: #fff;
            color: #333;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.3s;
        }

        .edit-icon:hover {
            transform: scale(1.1);
        }

        .title-name {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        /* == SALDO == */
        .balance-card {
            background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 15px 35px rgba(0, 114, 255, 0.3);
            position: relative;
            overflow: hidden;
        }

        .balance-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        .balance-label {
            font-size: 12px;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            position: relative;
            z-index: 1;
        }

        .balance-amount {
            font-size: 32px;
            font-weight: 700;
            position: relative;
            z-index: 1;
        }

        /* == HISTORY == */
        .history-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            gap: 15px;
        }

        .history-item {
            flex: 1;
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            transition: transform 0.3s;
        }

        .history-item:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.15);
        }

        .history-label {
            font-size: 10px;
            opacity: 0.7;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .history-value {
            font-size: 16px;
            font-weight: 600;
        }

        .plus { color: #4ade80; }
        .minus { color: #f87171; }

        /* == INPUT == */
        .input-section {
            margin-bottom: 25px;
        }

        .input-group {
            position: relative;
            margin-bottom: 15px;
        }

        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 15px 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }

        input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        input:focus {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.5);
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        /* == TOMBOL == */
        .btn-group {
            display: flex;
            gap: 15px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 14px;
        }

        .btn-in {
            background: #4ade80;
            color: #052e16;
            box-shadow: 0 10px 20px rgba(74, 222, 128, 0.3);
        }

        .btn-in:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(74, 222, 128, 0.4);
        }

        .btn-out {
            background: #f87171;
            color: #450a0a;
            box-shadow: 0 10px 20px rgba(248, 113, 113, 0.3);
        }

        .btn-out:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(248, 113, 113, 0.4);
        }

        /* == ANIMASIAngka == */
        @keyframes countUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* CSS untuk shake (disisipkan via JS biar ringan) */
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
            100% { transform: translateX(0); }
        }

    </style>
</head>
<body>

    <div class="bg-lights" id="bgLights"></div>

    <div class="container">
        <!-- Profil -->
        <div class="profile-section">
            <div class="profile-pic-wrapper">
                <img src="https://i.imgur.com/I1SBHEk.jpeg" alt="Profile" class="profile-pic" id="profileImage">
                <label for="fileInput" class="edit-icon">
                    <i class="fas fa-camera"></i>
                </label>
                <input type="file" id="fileInput" accept="image/*" hidden onchange="changePhoto(this)">
            </div>
            <div class="title-name">Tabungan Saya</div>
        </div>

        <!-- Saldo Total -->
        <div class="balance-card">
            <div class="balance-label">Total Saldo</div>
            <div class="balance-amount" id="balanceDisplay">Rp 0</div>
        </div>

        <!-- History Masuk/Keluar -->
        <div class="history-row">
            <div class="history-item">
                <div class="history-label">Uang Masuk</div>
                <div class="history-value plus" id="inDisplay">Rp 0</div>
            </div>
            <div class="history-item">
                <div class="history-label">Uang Keluar</div>
                <div class="history-value minus" id="outDisplay">Rp 0</div>
            </div>
        </div>

        <!-- Input Transaksi -->
        <div class="input-section">
            <div class="input-group">
                <input type="text" id="nominalInput" placeholder="Ketik Nominal..." oninput="formatInput(this)">
            </div>
            
            <div class="btn-group">
                <button class="btn btn-in" onclick="processTransaction('in')">
                    <i class="fas fa-arrow-down"></i> Masuk
                </button>
                <button class="btn btn-out" onclick="processTransaction('out')">
                    <i class="fas fa-arrow-up"></i> Keluar
                </button>
            </div>
        </div>
    </div>

    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <script>
        // == VARIABEL GLOBAL ==
        let saldo = 0;
        let uangMasuk = 0;
        let uangKeluar = 0;

        const elBalance = document.getElementById('balanceDisplay');
        const elIn = document.getElementById('inDisplay');
        const elOut = document.getElementById('outDisplay');
        const inputNominal = document.getElementById('nominalInput');

        // == FUNGSI LOCAL STORAGE == //
        
        // 1. Simpan Data ke Local Storage
        function saveData() {
            localStorage.setItem('tabungan_saldo', saldo);
            localStorage.setItem('tabungan_masuk', uangMasuk);
            localStorage.setItem('tabungan_keluar', uangKeluar);
        }

        // 2. Ambil Data dari Local Storage
        function loadData() {
            const savedSaldo = localStorage.getItem('tabungan_saldo');
            const savedMasuk = localStorage.getItem('tabungan_masuk');
            const savedKeluar = localStorage.getItem('tabungan_keluar');

            // Jika ada data tersimpan, parse ke integer. Jika tidak, default 0.
            saldo = savedSaldo ? parseInt(savedSaldo) : 0;
            uangMasuk = savedMasuk ? parseInt(savedMasuk) : 0;
            uangKeluar = savedKeluar ? parseInt(savedKeluar) : 0;
        }

        // == FUNGSI UTILITAS == //

        // Format Angka (100000 -> 100.000)
        function formatNum(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }

        // Animasi Angka (Count Up/Down)
        function animateValue(element, start, end, duration) {
            const range = end - start;
            const increment = end > start ? 1 : -1;
            const stepTime = Math.abs(Math.floor(duration / range));
            let current = start;
            
            const timer = setInterval(function() {
                current += increment;
                element.innerText = 'Rp ' + formatNum(current);
                if (current === end) {
                    clearInterval(timer);
                }
            }, stepTime);
        }

        // Update UI dengan Animasi
        function updateUI(oldSaldo, oldIn, oldOut) {
            animateValue(elBalance, oldSaldo, saldo, 500);
            animateValue(elIn, oldIn, uangMasuk, 500);
            animateValue(elOut, oldOut, uangKeluar, 500);
        }

        // Proses Transaksi
        function processTransaction(type) {
            let rawValue = inputNominal.value.replace(/[^0-9]/g, '');
            const nominal = parseInt(rawValue);

            if (!nominal || nominal <= 0) {
                shakeInput(); // Efek goyang saat error
                return;
            }

            // Simpan nilai lama untuk animasi
            const oldSaldo = saldo;
            const oldIn = uangMasuk;
            const oldOut = uangKeluar;

            if (type === 'in') {
                saldo += nominal;
                uangMasuk += nominal;
            } else {
                if (nominal > saldo) {
                    alert('Saldo tidak mencukupi!');
                    return;
                }
                saldo -= nominal;
                uangKeluar += nominal;
            }

            updateUI(oldSaldo, oldIn, oldOut);
            inputNominal.value = ''; // Kosongkan input

            // PENTING: Simpan data setelah update
            saveData(); 
        }

        // Format Input Real-time
        function formatInput(element) {
            let value = element.value.replace(/[^0-9]/g, '');
            if (value.length > 0) {
                element.value = value.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
            } else {
                element.value = "";
            }
        }

        // Ganti Foto
        function changePhoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    const img = document.getElementById('profileImage');
                    img.src = e.target.result;
                    img.style.animation = 'none'; // Reset animasi
                    setTimeout(() => img.style.animation = 'spin 0.5s ease', 10); // Putar sekali
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // Efek Goyang Input Error
        function shakeInput() {
            inputNominal.style.animation = "shake 0.5s";
            setTimeout(() => inputNominal.style.animation = "", 500);
        }

        // Generate Background Lights
        function createLights() {
            const container = document.getElementById('bgLights');
            for(let i=0; i<10; i++) {
                const light = document.createElement('div');
                light.classList.add('light');
                light.style.width = Math.random() * 300 + 100 + 'px';
                light.style.height = light.style.width;
                light.style.left = Math.random() * 100 + '%';
                light.style.animationDuration = Math.random() * 10 + 10 + 's';
                light.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(light);
            }
        }

        // == INISIALISASI ==
        window.onload = function() {
            createLights();
            
            // 1. Load data dari storage terlebih dahulu
            loadData();
            
            // 2. Update tampilan langsung tanpa animasi (agar langsung terlihat jumlahnya)
            elBalance.innerText = 'Rp ' + formatNum(saldo);
            elIn.innerText = 'Rp ' + formatNum(uangMasuk);
            elOut.innerText = 'Rp ' + formatNum(uangKeluar);
        };
    </script>
</body>
</html>
