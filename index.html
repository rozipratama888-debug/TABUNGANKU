<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabungan Premium - Permanen</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* == DASAR == */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background-image: url('https://i.imgur.com/I1SBHEk.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            overflow-y: auto;
            perspective: 1000px;
        }

        /* == EFEK CAHAYA BERGERAK (BACKGROUND) == */
        .bg-lights {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .light {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0) 70%);
            animation: floatLight linear infinite;
        }

        @keyframes floatLight {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
        }

        /* == CONTAINER UTAMA == */
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 30px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 
                0 20px 50px rgba(0,0,0,0.5),
                inset 0 0 20px rgba(255,255,255,0.1);
            padding: 30px;
            color: white;
            text-align: center;
            
            /* Animasi Awal */
            opacity: 0;
            transform: translateY(50px) scale(0.9);
            animation: cardEntry 1s cubic-bezier(0.175, 0.88, 0.32, 1.275) forwards;
        }

        @keyframes cardEntry {
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* == PROFIL == */
        .profile-section {
            position: relative;
            margin-bottom: 25px;
            opacity: 0;
            animation: slideUp 0.8s ease-out 0.3s forwards;
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-pic-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 15px;
        }

        .profile-pic {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid rgba(255,255,255,0.3);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: transform 0.5s ease;
        }

        .profile-pic:hover {
            transform: scale(1.05);
        }

        .edit-icon {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: #fff;
            color: #333;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.3s;
        }

        .edit-icon:hover {
            transform: scale(1.1);
        }

        .title-name {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        /* == SALDO == */
        .balance-card {
            background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 15px 35px rgba(0, 114, 255, 0.3);
            position: relative;
            overflow: hidden;
        }

        .balance-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        .balance-label {
            font-size: 12px;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            position: relative;
            z-index: 1;
        }

        .balance-amount {
            font-size: 32px;
            font-weight: 700;
            position: relative;
            z-index: 1;
        }

        /* == HISTORY == */
        .history-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 15px;
        }

        .history-item {
            flex: 1;
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            transition: transform 0.3s;
        }

        .history-item:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.15);
        }

        .history-label {
            font-size: 10px;
            opacity: 0.7;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .history-value {
            font-size: 16px;
            font-weight: 600;
        }

        .plus { color: #4ade80; }
        .minus { color: #f87171; }

        /* == INPUT == */
        .input-section {
            margin-bottom: 20px;
        }

        .input-group {
            position: relative;
            margin-bottom: 15px;
        }

        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 15px 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }

        input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        input:focus {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.5);
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        /* == TOMBOL == */
        .btn-group {
            display: flex;
            gap: 15px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 14px;
        }

        .btn-in {
            background: #4ade80;
            color: #052e16;
            box-shadow: 0 10px 20px rgba(74, 222, 128, 0.3);
        }

        .btn-in:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(74, 222, 128, 0.4);
        }

        .btn-out {
            background: #f87171;
            color: #450a0a;
            box-shadow: 0 10px 20px rgba(248, 113, 113, 0.3);
        }

        .btn-out:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(248, 113, 113, 0.4);
        }

        /* == IMPORT EXPORT SECTION == */
        .import-export-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.15);
        }

        .section-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
            margin-bottom: 15px;
        }

        .ie-buttons {
            display: flex;
            gap: 15px;
        }

        .btn-ie {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-export {
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            color: #451a03;
            box-shadow: 0 8px 20px rgba(251, 191, 36, 0.3);
        }

        .btn-export:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(251, 191, 36, 0.4);
        }

        .btn-import {
            background: linear-gradient(135deg, #a78bfa 0%, #7c3aed 100%);
            color: #1e1b4b;
            box-shadow: 0 8px 20px rgba(167, 139, 250, 0.3);
        }

        .btn-import:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(167, 139, 250, 0.4);
        }

        .btn-ie:active {
            transform: translateY(0);
        }

        .btn-ie i {
            font-size: 16px;
        }

        /* == ANIMASI == */
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
            100% { transform: translateX(0); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .success-pulse {
            animation: pulse 0.5s ease;
        }

        /* == NOTIFIKASI == */
        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 14px;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 5px 20px rgba(0,0,0,0.4);
            transition: all 0.3s ease;
        }

        .notification.show {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, 0);
        }

        .notification.success {
            background: linear-gradient(135deg, rgba(74, 222, 128, 0.9), rgba(34, 197, 94, 0.9));
            color: #052e16;
        }

        .notification.error {
            background: linear-gradient(135deg, rgba(248, 113, 113, 0.9), rgba(239, 68, 68, 0.9));
            color: #450a0a;
        }

        .notification.info {
            background: linear-gradient(135deg, rgba(167, 139, 250, 0.9), rgba(139, 92, 246, 0.9));
            color: #1e1b4b;
        }

        /* == MODAL KONFIRMASI == */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 9998;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(145deg, rgba(255,255,255,0.15), rgba(255,255,255,0.05));
            backdrop-filter: blur(20px);
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 30px;
            max-width: 350px;
            width: 100%;
            text-align: center;
            color: white;
            animation: modalPop 0.3s ease;
        }

        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-icon {
            font-size: 50px;
            margin-bottom: 15px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .modal-text {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .modal-btn-cancel {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .modal-btn-cancel:hover {
            background: rgba(255,255,255,0.2);
        }

        .modal-btn-confirm {
            background: linear-gradient(135deg, #4ade80, #22c55e);
            color: #052e16;
        }

        .modal-btn-confirm:hover {
            transform: translateY(-2px);
        }

        /* == HIDDEN INPUT FILE == */
        #importFile {
            display: none;
        }

        /* == RESPONSIVE == */
        @media (max-width: 420px) {
            .container {
                padding: 25px 20px;
            }
            
            .balance-amount {
                font-size: 26px;
            }
            
            .btn, .btn-ie {
                padding: 12px 15px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

    <div class="bg-lights" id="bgLights"></div>
    <div class="notification" id="notification"></div>

    <!-- Modal Konfirmasi Import -->
    <div class="modal-overlay" id="importModal">
        <div class="modal-content">
            <div class="modal-icon">
                <i class="fas fa-file-import"></i>
            </div>
            <div class="modal-title">Import Data</div>
            <div class="modal-text">
                Data saat ini akan diganti dengan data dari file. Lanjutkan?
            </div>
            <div class="modal-buttons">
                <button class="modal-btn modal-btn-cancel" onclick="closeImportModal()">
                    Batal
                </button>
                <button class="modal-btn modal-btn-confirm" onclick="confirmImport()">
                    Import
                </button>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- Profil -->
        <div class="profile-section">
            <div class="profile-pic-wrapper">
                <img src="https://i.imgur.com/I1SBHEk.jpeg" alt="Profile" class="profile-pic" id="profileImage">
                <label for="fileInput" class="edit-icon">
                    <i class="fas fa-camera"></i>
                </label>
                <input type="file" id="fileInput" accept="image/*" hidden>
            </div>
            <div class="title-name">Tabungan Permanen</div>
        </div>

        <!-- Saldo Total -->
        <div class="balance-card">
            <div class="balance-label">Total Saldo</div>
            <div class="balance-amount" id="balanceDisplay">Rp 0</div>
        </div>

        <!-- History Masuk/Keluar -->
        <div class="history-row">
            <div class="history-item">
                <div class="history-label">Uang Masuk</div>
                <div class="history-value plus" id="inDisplay">Rp 0</div>
            </div>
            <div class="history-item">
                <div class="history-label">Uang Keluar</div>
                <div class="history-value minus" id="outDisplay">Rp 0</div>
            </div>
        </div>

        <!-- Input Transaksi -->
        <div class="input-section">
            <div class="input-group">
                <input type="text" id="nominalInput" placeholder="Ketik Nominal..." oninput="formatInput(this)">
            </div>
            
            <div class="btn-group">
                <button class="btn btn-in" onclick="processTransaction('in')">
                    <i class="fas fa-arrow-down"></i> Masuk
                </button>
                <button class="btn btn-out" onclick="processTransaction('out')">
                    <i class="fas fa-arrow-up"></i> Keluar
                </button>
            </div>
        </div>

        <!-- Import Export Section -->
        <div class="import-export-section">
            <div class="section-title">Backup & Restore Data</div>
            <div class="ie-buttons">
                <button class="btn-ie btn-export" onclick="exportData()">
                    <i class="fas fa-download"></i>
                    Export
                </button>
                <button class="btn-ie btn-import" onclick="triggerImport()">
                    <i class="fas fa-upload"></i>
                    Import
                </button>
            </div>
            <input type="file" id="importFile" accept=".json" onchange="handleImportFile(event)">
        </div>
    </div>

    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <script>
        // == VARIABEL GLOBAL ==
        let saldo = 0;
        let uangMasuk = 0;
        let uangKeluar = 0;
        let db = null;
        let pendingImportData = null;

        const elBalance = document.getElementById('balanceDisplay');
        const elIn = document.getElementById('inDisplay');
        const elOut = document.getElementById('outDisplay');
        const inputNominal = document.getElementById('nominalInput');
        const notification = document.getElementById('notification');
        const fileInput = document.getElementById('fileInput');
        const profileImage = document.getElementById('profileImage');
        const importModal = document.getElementById('importModal');
        const importFile = document.getElementById('importFile');

        // == FUNGSI NOTIFIKASI ==
        function showNotification(message, type = 'default') {
            notification.textContent = message;
            notification.className = 'notification show ' + type;
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 2500);
        }

        // == INISIALISASI INDEXEDDB ==
        function initDatabase() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('TabunganDB', 1);

                request.onerror = function(event) {
                    console.error('Database error:', event.target.error);
                    reject(event.target.error);
                };

                request.onsuccess = function(event) {
                    db = event.target.result;
                    console.log('Database opened successfully');
                    resolve(db);
                };

                request.onupgradeneeded = function(event) {
                    const database = event.target.result;
                    
                    if (!database.objectStoreNames.contains('data')) {
                        database.createObjectStore('data', { keyPath: 'id' });
                        console.log('Object store created');
                    }
                    
                    if (!database.objectStoreNames.contains('profile')) {
                        database.createObjectStore('profile', { keyPath: 'id' });
                        console.log('Profile store created');
                    }
                };
            });
        }

        // == FUNGSI SIMPAN DATA KE INDEXEDDB ==
        async function saveData() {
            try {
                const transaction = db.transaction(['data'], 'readwrite');
                const store = transaction.objectStore('data');
                
                const data = {
                    id: 'tabungan',
                    saldo: saldo,
                    uangMasuk: uangMasuk,
                    uangKeluar: uangKeluar,
                    lastUpdated: new Date().toISOString()
                };
                
                const request = store.put(data);
                
                request.onsuccess = function() {
                    console.log('Data saved to IndexedDB');
                };
                
                request.onerror = function(event) {
                    console.error('Error saving data:', event.target.error);
                    saveToLocalStorage();
                };
                
            } catch (error) {
                console.error('Error in saveData:', error);
                saveToLocalStorage();
            }
        }

        // == FUNGSI SIMPAN KE LOCALSTORAGE (FALLBACK) ==
        function saveToLocalStorage() {
            localStorage.setItem('tabungan_saldo', saldo);
            localStorage.setItem('tabungan_masuk', uangMasuk);
            localStorage.setItem('tabungan_keluar', uangKeluar);
        }

        // == FUNGSI LOAD DATA DARI INDEXEDDB ==
        async function loadData() {
            try {
                if (db) {
                    const transaction = db.transaction(['data'], 'readonly');
                    const store = transaction.objectStore('data');
                    const request = store.get('tabungan');
                    
                    request.onsuccess = function(event) {
                        const data = event.target.result;
                        if (data) {
                            saldo = data.saldo || 0;
                            uangMasuk = data.uangMasuk || 0;
                            uangKeluar = data.uangKeluar || 0;
                            console.log('Data loaded from IndexedDB');
                        } else {
                            loadFromLocalStorage();
                        }
                        updateDisplay();
                    };
                    
                    request.onerror = function() {
                        loadFromLocalStorage();
                        updateDisplay();
                    };
                } else {
                    loadFromLocalStorage();
                    updateDisplay();
                }
            } catch (error) {
                console.error('Error loading data:', error);
                loadFromLocalStorage();
                updateDisplay();
            }
        }

        // == FUNGSI LOAD DARI LOCALSTORAGE (FALLBACK) ==
        function loadFromLocalStorage() {
            const savedSaldo = localStorage.getItem('tabungan_saldo');
            const savedMasuk = localStorage.getItem('tabungan_masuk');
            const savedKeluar = localStorage.getItem('tabungan_keluar');

            saldo = savedSaldo ? parseInt(savedSaldo) : 0;
            uangMasuk = savedMasuk ? parseInt(savedMasuk) : 0;
            uangKeluar = savedKeluar ? parseInt(savedKeluar) : 0;
            
            console.log('Data loaded from localStorage');
        }

        // == FUNGSI UPDATE DISPLAY ==
        function updateDisplay() {
            elBalance.innerText = 'Rp ' + formatNum(saldo);
            elIn.innerText = 'Rp ' + formatNum(uangMasuk);
            elOut.innerText = 'Rp ' + formatNum(uangKeluar);
        }

        // == FUNGSI SIMPAN FOTO PROFIL ==
        async function saveProfilePhoto(imageData) {
            try {
                const transaction = db.transaction(['profile'], 'readwrite');
                const store = transaction.objectStore('profile');
                
                const data = {
                    id: 'profilePhoto',
                    imageData: imageData,
                    lastUpdated: new Date().toISOString()
                };
                
                const request = store.put(data);
                
                request.onsuccess = function() {
                    console.log('Profile photo saved');
                };
                
            } catch (error) {
                console.error('Error saving profile photo:', error);
                localStorage.setItem('profile_photo', imageData);
            }
        }

        // == FUNGSI LOAD FOTO PROFIL ==
        async function loadProfilePhoto() {
            try {
                if (db) {
                    const transaction = db.transaction(['profile'], 'readonly');
                    const store = transaction.objectStore('profile');
                    const request = store.get('profilePhoto');
                    
                    request.onsuccess = function(event) {
                        const data = event.target.result;
                        if (data && data.imageData) {
                            profileImage.src = data.imageData;
                        } else {
                            const savedPhoto = localStorage.getItem('profile_photo');
                            if (savedPhoto) {
                                profileImage.src = savedPhoto;
                            }
                        }
                    };
                } else {
                    const savedPhoto = localStorage.getItem('profile_photo');
                    if (savedPhoto) {
                        profileImage.src = savedPhoto;
                    }
                }
            } catch (error) {
                console.error('Error loading profile photo:', error);
            }
        }

        // == FUNGSI UTILITAS ==
        function formatNum(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }

        function animateValue(element, start, end, duration) {
            const range = Math.abs(end - start);
            if (range === 0) return;
            
            const increment = end > start ? 1 : -1;
            const stepTime = Math.abs(Math.floor(duration / range));
            let current = start;
            
            const timer = setInterval(function() {
                current += increment * Math.ceil(range / 20);
                if ((increment > 0 && current >= end) || (increment < 0 && current <= end)) {
                    current = end;
                    clearInterval(timer);
                }
                element.innerText = 'Rp ' + formatNum(current);
            }, stepTime || 20);
        }

        function updateUI(oldSaldo, oldIn, oldOut) {
            animateValue(elBalance, oldSaldo, saldo, 400);
            animateValue(elIn, oldIn, uangMasuk, 400);
            animateValue(elOut, oldOut, uangKeluar, 400);
        }

        async function processTransaction(type) {
            let rawValue = inputNominal.value.replace(/[^0-9]/g, '');
            const nominal = parseInt(rawValue);

            if (!nominal || nominal <= 0) {
                shakeInput();
                showNotification('Masukkan nominal yang valid!', 'error');
                return;
            }

            const oldSaldo = saldo;
            const oldIn = uangMasuk;
            const oldOut = uangKeluar;

            if (type === 'in') {
                saldo += nominal;
                uangMasuk += nominal;
            } else {
                if (nominal > saldo) {
                    showNotification('Saldo tidak mencukupi!', 'error');
                    return;
                }
                saldo -= nominal;
                uangKeluar += nominal;
            }

            updateUI(oldSaldo, oldIn, oldOut);
            inputNominal.value = '';

            await saveData();
            showNotification('Transaksi berhasil disimpan!', 'success');
            
            // Pulse animation on balance card
            document.querySelector('.balance-card').classList.add('success-pulse');
            setTimeout(() => {
                document.querySelector('.balance-card').classList.remove('success-pulse');
            }, 500);
        }

        function formatInput(element) {
            let value = element.value.replace(/[^0-9]/g, '');
            if (value.length > 0) {
                element.value = value.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
            } else {
                element.value = "";
            }
        }

        function shakeInput() {
            inputNominal.style.animation = "shake 0.5s";
            setTimeout(() => inputNominal.style.animation = "", 500);
        }

        function createLights() {
            const container = document.getElementById('bgLights');
            for(let i = 0; i < 15; i++) {
                const light = document.createElement('div');
                light.classList.add('light');
                const size = Math.random() * 300 + 100;
                light.style.width = size + 'px';
                light.style.height = size + 'px';
                light.style.left = Math.random() * 100 + '%';
                light.style.animationDuration = Math.random() * 10 + 15 + 's';
                light.style.animationDelay = Math.random() * 10 + 's';
                container.appendChild(light);
            }
        }

        // == FUNGSI EXPORT DATA ==
        async function exportData() {
            try {
                // Ambil foto profil
                let profileImageData = null;
                try {
                    if (db) {
                        const transaction = db.transaction(['profile'], 'readonly');
                        const store = transaction.objectStore('profile');
                        const request = store.get('profilePhoto');
                        
                        profileImageData = await new Promise((resolve) => {
                            request.onsuccess = function(event) {
                                const data = event.target.result;
                                resolve(data ? data.imageData : null);
                            };
                            request.onerror = function() {
                                resolve(null);
                            };
                        });
                    }
                } catch (e) {
                    console.log('No profile photo to export');
                }

                // Jika tidak ada di IndexedDB, cek localStorage
                if (!profileImageData) {
                    profileImageData = localStorage.getItem('profile_photo');
                }

                const exportDataObj = {
                    version: '1.0',
                    exportDate: new Date().toISOString(),
                    data: {
                        saldo: saldo,
                        uangMasuk: uangMasuk,
                        uangKeluar: uangKeluar
                    },
                    profileImage: profileImageData
                };

                const jsonString = JSON.stringify(exportDataObj, null, 2);
                const blob = new Blob([jsonString], { type: 'application/json' });
                const url = URL.createObjectURL(blob);

                // Buat link download
                const dateStr = new Date().toISOString().slice(0, 10);
                const fileName = `tabungan_backup_${dateStr}.json`;

                const a = document.createElement('a');
                a.href = url;
                a.download = fileName;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                showNotification('Data berhasil di-export!', 'success');
            } catch (error) {
                console.error('Export error:', error);
                showNotification('Gagal export data!', 'error');
            }
        }

        // == FUNGSI TRIGGER IMPORT ==
        function triggerImport() {
            importFile.click();
        }

        // == FUNGSI HANDLE IMPORT FILE ==
        function handleImportFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            // Cek ekstensi file
            if (!file.name.endsWith('.json')) {
                showNotification('File harus format JSON!', 'error');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    
                    // Validasi struktur data
                    if (!importedData.data || 
                        typeof importedData.data.saldo === 'undefined' ||
                        typeof importedData.data.uangMasuk === 'undefined' ||
                        typeof importedData.data.uangKeluar === 'undefined') {
                        showNotification('Format file tidak valid!', 'error');
                        return;
                    }

                    // Simpan data untuk di-import setelah konfirmasi
                    pendingImportData = importedData;
                    
                    // Tampilkan modal konfirmasi
                    importModal.classList.add('show');
                    
                } catch (error) {
                    console.error('Parse error:', error);
                    showNotification('File rusak atau tidak valid!', 'error');
                }
            };
            
            reader.readAsText(file);
            
            // Reset input file
            event.target.value = '';
        }

        // == FUNGSI KONFIRMASI IMPORT ==
        async function confirmImport() {
            if (!pendingImportData) return;
            
            try {
                const oldSaldo = saldo;
                const oldIn = uangMasuk;
                const oldOut = uangKeluar;

                // Update data
                saldo = pendingImportData.data.saldo || 0;
                uangMasuk = pendingImportData.data.uangMasuk || 0;
                uangKeluar = pendingImportData.data.uangKeluar || 0;

                // Update tampilan dengan animasi
                updateUI(oldSaldo, oldIn, oldOut);

                // Simpan ke database
                await saveData();

                // Import foto profil jika ada
                if (pendingImportData.profileImage) {
                    profileImage.src = pendingImportData.profileImage;
                    await saveProfilePhoto(pendingImportData.profileImage);
                }

                showNotification('Data berhasil di-import!', 'success');
                
                // Pulse animation
                document.querySelector('.balance-card').classList.add('success-pulse');
                setTimeout(() => {
                    document.querySelector('.balance-card').classList.remove('success-pulse');
                }, 500);
                
            } catch (error) {
                console.error('Import error:', error);
                showNotification('Gagal import data!', 'error');
            }
            
            // Tutup modal dan reset
            closeImportModal();
        }

        // == FUNGSI TUTUP MODAL ==
        function closeImportModal() {
            importModal.classList.remove('show');
            pendingImportData = null;
        }

        // == EVENT HANDLER FOTO PROFIL ==
        fileInput.addEventListener('change', function(e) {
            if (e.target.files && e.target.files[0]) {
                const reader = new FileReader();
                reader.onload = async function(e) {
                    profileImage.src = e.target.result;
                    await saveProfilePhoto(e.target.result);
                    showNotification('Foto profil tersimpan!', 'success');
                };
                reader.readAsDataURL(e.target.files[0]);
            }
        });

        // == KEYBOARD SUPPORT ==
        inputNominal.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                processTransaction('in');
            }
        });

        // == CLOSE MODAL ON OUTSIDE CLICK ==
        importModal.addEventListener('click', function(e) {
            if (e.target === importModal) {
                closeImportModal();
            }
        });

        // == INISIALISASI ==
        window.onload = async function() {
            createLights();
            
            try {
                await initDatabase();
                await loadData();
                await loadProfilePhoto();
                console.log('App initialized successfully');
            } catch (error) {
                console.error('Initialization error:', error);
                loadFromLocalStorage();
                updateDisplay();
            }
        };
    </script>
</body>
</html>
