<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabungan Premium - Permanen</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* == DASAR == */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background-image: url('https://i.imgur.com/I1SBHEk.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
            perspective: 1000px;
        }

        /* == EFEK CAHAYA BERGERAK (BACKGROUND) == */
        .bg-lights {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .light {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0) 70%);
            animation: floatLight linear infinite;
        }

        @keyframes floatLight {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
        }

        /* == CONTAINER UTAMA == */
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 30px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 
                0 20px 50px rgba(0,0,0,0.5),
                inset 0 0 20px rgba(255,255,255,0.1);
            padding: 30px;
            color: white;
            text-align: center;
            
            /* Animasi Awal */
            opacity: 0;
            transform: translateY(50px) scale(0.9);
            animation: cardEntry 1s cubic-bezier(0.175, 0.88, 0.32, 1.275) forwards;
        }

        @keyframes cardEntry {
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* == PROFIL == */
        .profile-section {
            position: relative;
            margin-bottom: 25px;
            opacity: 0;
            animation: slideUp 0.8s ease-out 0.3s forwards;
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-pic-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 15px;
        }

        .profile-pic {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid rgba(255,255,255,0.3);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: transform 0.5s ease;
        }

        .profile-pic:hover {
            transform: scale(1.05);
        }

        .edit-icon {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: #fff;
            color: #333;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.3s;
        }

        .edit-icon:hover {
            transform: scale(1.1);
        }

        .title-name {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        /* == SALDO == */
        .balance-card {
            background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 15px 35px rgba(0, 114, 255, 0.3);
            position: relative;
            overflow: hidden;
        }

        .balance-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        .balance-label {
            font-size: 12px;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            position: relative;
            z-index: 1;
        }

        .balance-amount {
            font-size: 32px;
            font-weight: 700;
            position: relative;
            z-index: 1;
        }

        /* == HISTORY == */
        .history-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            gap: 15px;
        }

        .history-item {
            flex: 1;
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            transition: transform 0.3s;
        }

        .history-item:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.15);
        }

        .history-label {
            font-size: 10px;
            opacity: 0.7;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .history-value {
            font-size: 16px;
            font-weight: 600;
        }

        .plus { color: #4ade80; }
        .minus { color: #f87171; }

        /* == INPUT == */
        .input-section {
            margin-bottom: 25px;
        }

        .input-group {
            position: relative;
            margin-bottom: 15px;
        }

        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 15px 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }

        input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        input:focus {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.5);
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        /* == TOMBOL == */
        .btn-group {
            display: flex;
            gap: 15px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 14px;
        }

        .btn-in {
            background: #4ade80;
            color: #052e16;
            box-shadow: 0 10px 20px rgba(74, 222, 128, 0.3);
        }

        .btn-in:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(74, 222, 128, 0.4);
        }

        .btn-out {
            background: #f87171;
            color: #450a0a;
            box-shadow: 0 10px 20px rgba(248, 113, 113, 0.3);
        }

        .btn-out:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(248, 113, 113, 0.4);
        }

        /* == ANIMASI == */
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
            100% { transform: translateX(0); }
        }

        /* == NOTIFIKASI == */
        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 14px;
            z-index: 9999;
            display: none;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .notification.show {
            display: block;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translate(-50%, -20px);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }
    </style>
</head>
<body>

    <div class="bg-lights" id="bgLights"></div>
    <div class="notification" id="notification">Data tersimpan permanen</div>

    <div class="container">
        <!-- Profil -->
        <div class="profile-section">
            <div class="profile-pic-wrapper">
                <img src="https://i.imgur.com/I1SBHEk.jpeg" alt="Profile" class="profile-pic" id="profileImage">
                <label for="fileInput" class="edit-icon">
                    <i class="fas fa-camera"></i>
                </label>
                <input type="file" id="fileInput" accept="image/*" hidden>
            </div>
            <div class="title-name">Tabungan Permanen</div>
        </div>

        <!-- Saldo Total -->
        <div class="balance-card">
            <div class="balance-label">Total Saldo</div>
            <div class="balance-amount" id="balanceDisplay">Rp 0</div>
        </div>

        <!-- History Masuk/Keluar -->
        <div class="history-row">
            <div class="history-item">
                <div class="history-label">Uang Masuk</div>
                <div class="history-value plus" id="inDisplay">Rp 0</div>
            </div>
            <div class="history-item">
                <div class="history-label">Uang Keluar</div>
                <div class="history-value minus" id="outDisplay">Rp 0</div>
            </div>
        </div>

        <!-- Input Transaksi -->
        <div class="input-section">
            <div class="input-group">
                <input type="text" id="nominalInput" placeholder="Ketik Nominal..." oninput="formatInput(this)">
            </div>
            
            <div class="btn-group">
                <button class="btn btn-in" onclick="processTransaction('in')">
                    <i class="fas fa-arrow-down"></i> Masuk
                </button>
                <button class="btn btn-out" onclick="processTransaction('out')">
                    <i class="fas fa-arrow-up"></i> Keluar
                </button>
            </div>
        </div>
    </div>

    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <script>
        // == VARIABEL GLOBAL ==
        let saldo = 0;
        let uangMasuk = 0;
        let uangKeluar = 0;
        let db; // Database IndexedDB

        const elBalance = document.getElementById('balanceDisplay');
        const elIn = document.getElementById('inDisplay');
        const elOut = document.getElementById('outDisplay');
        const inputNominal = document.getElementById('nominalInput');
        const notification = document.getElementById('notification');
        const fileInput = document.getElementById('fileInput');
        const profileImage = document.getElementById('profileImage');

        // == FUNGSI NOTIFIKASI ==
        function showNotification(message) {
            notification.textContent = message;
            notification.classList.add('show');
            setTimeout(() => {
                notification.classList.remove('show');
            }, 2000);
        }

        // == INISIALISASI INDEXEDDB ==
        function initDatabase() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('TabunganDB', 1);

                request.onerror = function(event) {
                    console.error('Database error:', event.target.error);
                    reject(event.target.error);
                };

                request.onsuccess = function(event) {
                    db = event.target.result;
                    console.log('Database opened successfully');
                    resolve(db);
                };

                request.onupgradeneeded = function(event) {
                    const db = event.target.result;
                    
                    // Buat object store untuk data tabungan
                    if (!db.objectStoreNames.contains('data')) {
                        const store = db.createObjectStore('data', { keyPath: 'id' });
                        console.log('Object store created');
                    }
                    
                    // Buat object store untuk foto profil
                    if (!db.objectStoreNames.contains('profile')) {
                        const profileStore = db.createObjectStore('profile', { keyPath: 'id' });
                        console.log('Profile store created');
                    }
                };
            });
        }

        // == FUNGSI SIMPAN DATA KE INDEXEDDB ==
        async function saveData() {
            try {
                const transaction = db.transaction(['data'], 'readwrite');
                const store = transaction.objectStore('data');
                
                const data = {
                    id: 'tabungan',
                    saldo: saldo,
                    uangMasuk: uangMasuk,
                    uangKeluar: uangKeluar,
                    lastUpdated: new Date().toISOString()
                };
                
                const request = store.put(data);
                
                request.onsuccess = function() {
                    console.log('Data saved to IndexedDB');
                };
                
                request.onerror = function(event) {
                    console.error('Error saving data:', event.target.error);
                    // Fallback ke localStorage jika IndexedDB gagal
                    localStorage.setItem('tabungan_saldo', saldo);
                    localStorage.setItem('tabungan_masuk', uangMasuk);
                    localStorage.setItem('tabungan_keluar', uangKeluar);
                };
                
            } catch (error) {
                console.error('Error in saveData:', error);
                // Fallback ke localStorage
                localStorage.setItem('tabungan_saldo', saldo);
                localStorage.setItem('tabungan_masuk', uangMasuk);
                localStorage.setItem('tabungan_keluar', uangKeluar);
            }
        }

        // == FUNGSI LOAD DATA DARI INDEXEDDB ==
        async function loadData() {
            try {
                // Coba load dari IndexedDB dulu
                if (db) {
                    const transaction = db.transaction(['data'], 'readonly');
                    const store = transaction.objectStore('data');
                    const request = store.get('tabungan');
                    
                    request.onsuccess = function(event) {
                        const data = event.target.result;
                        if (data) {
                            saldo = data.saldo || 0;
                            uangMasuk = data.uangMasuk || 0;
                            uangKeluar = data.uangKeluar || 0;
                            console.log('Data loaded from IndexedDB');
                        } else {
                            // Jika tidak ada di IndexedDB, coba load dari localStorage
                            loadFromLocalStorage();
                        }
                        updateDisplay();
                    };
                    
                    request.onerror = function() {
                        // Jika gagal, coba load dari localStorage
                        loadFromLocalStorage();
                        updateDisplay();
                    };
                } else {
                    // Jika IndexedDB belum siap, load dari localStorage
                    loadFromLocalStorage();
                    updateDisplay();
                }
            } catch (error) {
                console.error('Error loading data:', error);
                loadFromLocalStorage();
                updateDisplay();
            }
        }

        // == FUNGSI LOAD DARI LOCALSTORAGE (FALLBACK) ==
        function loadFromLocalStorage() {
            const savedSaldo = localStorage.getItem('tabungan_saldo');
            const savedMasuk = localStorage.getItem('tabungan_masuk');
            const savedKeluar = localStorage.getItem('tabungan_keluar');

            saldo = savedSaldo ? parseInt(savedSaldo) : 0;
            uangMasuk = savedMasuk ? parseInt(savedMasuk) : 0;
            uangKeluar = savedKeluar ? parseInt(savedKeluar) : 0;
            
            console.log('Data loaded from localStorage');
        }

        // == FUNGSI UPDATE DISPLAY ==
        function updateDisplay() {
            elBalance.innerText = 'Rp ' + formatNum(saldo);
            elIn.innerText = 'Rp ' + formatNum(uangMasuk);
            elOut.innerText = 'Rp ' + formatNum(uangKeluar);
        }

        // == FUNGSI SIMPAN FOTO PROFIL ==
        async function saveProfilePhoto(imageData) {
            try {
                const transaction = db.transaction(['profile'], 'readwrite');
                const store = transaction.objectStore('profile');
                
                const data = {
                    id: 'profilePhoto',
                    imageData: imageData,
                    lastUpdated: new Date().toISOString()
                };
                
                const request = store.put(data);
                
                request.onsuccess = function() {
                    console.log('Profile photo saved');
                };
                
            } catch (error) {
                console.error('Error saving profile photo:', error);
                // Fallback ke localStorage
                localStorage.setItem('profile_photo', imageData);
            }
        }

        // == FUNGSI LOAD FOTO PROFIL ==
        async function loadProfilePhoto() {
            try {
                if (db) {
                    const transaction = db.transaction(['profile'], 'readonly');
                    const store = transaction.objectStore('profile');
                    const request = store.get('profilePhoto');
                    
                    request.onsuccess = function(event) {
                        const data = event.target.result;
                        if (data && data.imageData) {
                            profileImage.src = data.imageData;
                        } else {
                            // Coba load dari localStorage
                            const savedPhoto = localStorage.getItem('profile_photo');
                            if (savedPhoto) {
                                profileImage.src = savedPhoto;
                            }
                        }
                    };
                } else {
                    const savedPhoto = localStorage.getItem('profile_photo');
                    if (savedPhoto) {
                        profileImage.src = savedPhoto;
                    }
                }
            } catch (error) {
                console.error('Error loading profile photo:', error);
            }
        }

        // == FUNGSI UTILITAS LAINNYA ==
        function formatNum(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }

        function animateValue(element, start, end, duration) {
            const range = end - start;
            const increment = end > start ? 1 : -1;
            const stepTime = Math.abs(Math.floor(duration / range));
            let current = start;
            
            const timer = setInterval(function() {
                current += increment;
                element.innerText = 'Rp ' + formatNum(current);
                if (current === end) {
                    clearInterval(timer);
                }
            }, stepTime);
        }

        function updateUI(oldSaldo, oldIn, oldOut) {
            animateValue(elBalance, oldSaldo, saldo, 500);
            animateValue(elIn, oldIn, uangMasuk, 500);
            animateValue(elOut, oldOut, uangKeluar, 500);
        }

        async function processTransaction(type) {
            let rawValue = inputNominal.value.replace(/[^0-9]/g, '');
            const nominal = parseInt(rawValue);

            if (!nominal || nominal <= 0) {
                shakeInput();
                return;
            }

            const oldSaldo = saldo;
            const oldIn = uangMasuk;
            const oldOut = uangKeluar;

            if (type === 'in') {
                saldo += nominal;
                uangMasuk += nominal;
            } else {
                if (nominal > saldo) {
                    alert('Saldo tidak mencukupi!');
                    return;
                }
                saldo -= nominal;
                uangKeluar += nominal;
            }

            updateUI(oldSaldo, oldIn, oldOut);
            inputNominal.value = '';

            // Simpan ke IndexedDB
            await saveData();
            showNotification('Data tersimpan permanen!');
        }

        function formatInput(element) {
            let value = element.value.replace(/[^0-9]/g, '');
            if (value.length > 0) {
                element.value = value.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
            } else {
                element.value = "";
            }
        }

        function shakeInput() {
            inputNominal.style.animation = "shake 0.5s";
            setTimeout(() => inputNominal.style.animation = "", 500);
        }

        function createLights() {
            const container = document.getElementById('bgLights');
            for(let i=0; i<10; i++) {
                const light = document.createElement('div');
                light.classList.add('light');
                light.style.width = Math.random() * 300 + 100 + 'px';
                light.style.height = light.style.width;
                light.style.left = Math.random() * 100 + '%';
                light.style.animationDuration = Math.random() * 10 + 10 + 's';
                light.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(light);
            }
        }

        // == EVENT HANDLER FOTO PROFIL ==
        fileInput.addEventListener('change', function(e) {
            if (e.target.files && e.target.files[0]) {
                const reader = new FileReader();
                reader.onload = async function(e) {
                    const img = document.getElementById('profileImage');
                    img.src = e.target.result;
                    
                    // Simpan foto ke IndexedDB
                    await saveProfilePhoto(e.target.result);
                    showNotification('Foto profil tersimpan!');
                };
                reader.readAsDataURL(e.target.files[0]);
            }
        });

        // == INISIALISASI ==
        window.onload = async function() {
            createLights();
            
            // Inisialisasi database
            try {
                await initDatabase();
                await loadData();
                await loadProfilePhoto();
                console.log('Data loaded successfully');
            } catch (error) {
                console.error('Error initializing:', error);
                // Fallback ke localStorage
                loadFromLocalStorage();
                updateDisplay();
            }
        };
    </script>
</body>
</html>
